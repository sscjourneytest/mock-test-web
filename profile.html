<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Profile | Mock Matrix Hub</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Poppins:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/auth.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --white: #ffffff;
            --bg-light: #f8fafc;
            --border: #e2e8f0;
            --text-dark: #0f172a;
            --text-grey: #64748b;
        }

        body.dark-mode {
            --bg-light: #0f172a; --white: #1e293b; --text-dark: #f1f5f9; --text-grey: #94a3b8; --border: #334155;
            background-color: #020617 !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding-bottom: 100px;
        }

        /* --- APP HEADER --- */
        .app-header {
            background: var(--white);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .back-btn { background: none; border: none; font-size: 1.2rem; color: var(--text-dark); cursor: pointer; }
        .header-title { font-weight: 800; font-size: 1.1rem; margin: 0; }

        /* --- PROFILE CARD --- */
        .profile-hero {
            background: linear-gradient(135deg, #1e40af 0%, #2563eb 100%);
            padding: 40px 20px;
            text-align: center;
            color: white;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            margin-bottom: 20px;
        }

        .user-avatar {
            width: 80px; height: 80px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px; font-size: 2rem; color: var(--primary);
            border: 4px solid rgba(255,255,255,0.2); font-weight: 800;
        }

        .badge-status {
            display: inline-block; padding: 4px 12px; border-radius: 50px;
            font-size: 11px; font-weight: 800; text-transform: uppercase;
            margin-top: 8px;
        }
        .status-pro { background: #f59e0b; color: #fff; }
        .status-free { background: rgba(255,255,255,0.2); color: #fff; }

        /* --- INFO LIST --- */
        .info-container { padding: 0 20px; }
        .info-group {
            background: var(--white);
            border-radius: 20px;
            padding: 5px 0;
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            margin-bottom: 20px;
        }

        .info-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 20px; border-bottom: 1px solid var(--border);
        }
        .info-item:last-child { border-bottom: none; }
        
        .info-label { display: flex; align-items: center; gap: 12px; }
        .info-label i { width: 20px; color: var(--text-grey); font-size: 1.1rem; }
        .info-label span { font-weight: 600; font-size: 14px; color: var(--text-grey); }
        .info-value { font-weight: 700; font-size: 14px; color: var(--text-dark); }

        .partner-code { color: var(--primary); font-family: 'Poppins', sans-serif; letter-spacing: 1px; }

        /* --- BUTTONS --- */
        .action-area { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
        .btn-profile {
            width: 100%; padding: 14px; border-radius: 14px; font-weight: 700;
            border: none; cursor: pointer; transition: 0.3s; font-size: 15px;
        }
        .btn-premium { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .btn-logout { background: #fee2e2; color: #ef4444; }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--white); display: flex; justify-content: space-around;
            padding: 12px 0; border-top: 1px solid var(--border); z-index: 1000;
        }
        .nav-item { text-align: center; color: var(--text-grey); text-decoration: none; font-size: 0.7rem; font-weight: 700; flex: 1; }
        .nav-item i { display: block; font-size: 1.3rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <header class="app-header">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
        <h1 class="header-title">My Account</h1>
    </header>

    <div class="profile-hero">
        <div class="user-avatar" id="avatarLetter">U</div>
        <h4 class="m-0 fw-bold" id="dispName">User Account</h4>
        <div id="statusBadge"></div>
    </div>

    <div class="info-container">
        <div class="info-group">
            <div class="info-item">
                <div class="info-label"><i class="fas fa-user-circle"></i><span>Username</span></div>
                <div class="info-value" id="valName">Loading...</div>
            </div>
            <div class="info-item">
                <div class="info-label"><i class="fas fa-envelope"></i><span>Email</span></div>
                <div class="info-value" id="valEmail">Loading...</div>
            </div>
        </div>

        <div class="info-group">
            <div class="info-item">
                <div class="info-label"><i class="fas fa-calendar-check"></i><span>Plan Expiry</span></div>
                <div class="info-value" id="valExpiry">Not Active</div>
            </div>
            <div class="info-item" id="partnerRow" style="display: none;">
                <div class="info-label"><i class="fas fa-ticket-alt"></i><span>Partner Code</span></div>
                <div class="info-value partner-code" id="valPartner">NONE</div>
            </div>
        </div>
    </div>

    <div class="action-area">
        <button onclick="window.location.href='/buy-premium.html'" class="btn-profile btn-premium" id="upgradeBtn">
            <i class="fas fa-crown me-2"></i> Upgrade to Premium
        </button>
        <button onclick="handleLogout()" class="btn-profile btn-logout">
            <i class="fas fa-sign-out-alt me-2"></i> Logout Account
        </button>
    </div>

    <nav class="bottom-nav">
        <a href="/" class="nav-item"><i class="fas fa-home-alt"></i><span>HOME</span></a>
        <a href="/exams/" class="nav-item"><i class="fas fa-file-pen"></i><span>EXAMS</span></a>
        <a href="/live-test" class="nav-item"><i class="fas fa-bolt"></i><span>LIVE</span></a>
        <a href="/profile" class="nav-item active"><i class="fas fa-user-circle"></i><span>PROFILE</span></a>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('mmh_theme') === 'dark') document.body.classList.add('dark-mode');

            // Fetch profile data from auth.js encrypted cache
            const profile = typeof getLocalProfile === 'function' ? getLocalProfile() : null;

            if (profile) {
                // Set UI Values
                const name = profile.username || "User";
                document.getElementById('dispName').innerText = name;
                document.getElementById('valName').innerText = name;
                document.getElementById('valEmail').innerText = profile.email || "No Email Found";
                document.getElementById('avatarLetter').innerText = name.charAt(0).toUpperCase();

                // Paid Logic
                if (profile.is_paid) {
                    document.getElementById('statusBadge').innerHTML = '<span class="badge-status status-pro">PRO MEMBER</span>';
                    document.getElementById('upgradeBtn').style.display = 'none';
                    
                    if (profile.expires_at) {
                        const date = new Date(profile.expires_at);
                        document.getElementById('valExpiry').innerText = date.toLocaleDateString('en-GB', {
                            day: 'numeric', month: 'short', year: 'numeric'
                        });
                    }
                } else {
                    document.getElementById('statusBadge').innerHTML = '<span class="badge-status status-free">FREE ACCOUNT</span>';
                }

                // Partner Logic
                if (profile.is_partner && profile.partner_coupon) {
                    document.getElementById('partnerRow').style.display = 'flex';
                    document.getElementById('valPartner').innerText = profile.partner_coupon;
                }
            } else {
                // If no profile exists, redirect to login
                window.location.href = "/login.html";
            }
        });
    </script>
</body>
</html>
