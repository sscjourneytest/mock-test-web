<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Response Master Pro | Clean & Merge</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --primary: #226785;
            --primary-hover: #1a526b;
            --accent: #28a745;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container { max-width: 950px; margin: 0 auto; }

        .box {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        h1 { text-align: center; color: var(--primary); margin-bottom: 10px; font-size: 28px; }

        .instructions {
            background: #fff9db;
            border: 1px solid #fab005;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .form-group { margin-bottom: 20px; }

        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
            padding: 20px;
            background: #f1f5f9;
            border-radius: 10px;
        }

        .checkbox-group { display: flex; align-items: center; gap: 8px; font-weight: 600; }

        .part-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .part-section {
            padding: 10px;
            border-left: 4px solid var(--primary);
            background: #fdfdfd;
            border: 1px solid var(--border);
            border-left-width: 4px;
            border-radius: 4px;
        }

        .part-section textarea { height: 60px; font-size: 12px; margin-top: 5px; }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            width: 100%;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn:hover { background: var(--primary-hover); }
        .btn-fetch { background: #6366f1; margin-bottom: 20px; }
        .btn-zip { background: #f59e0b; margin-top: 10px; }

        #loader { display: none; text-align: center; margin: 20px 0; font-weight: bold; color: var(--primary); }

        #print-area { display: none; background: white; }
        
        /* Preserve colors for mobile/PDF */
        @media print {
            .no-print { display: none !important; }
            #print-area { display: block !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .section-break { page-break-before: always; border-top: 1px solid #eee; padding-top: 20px; }
            img { max-width: 100% !important; height: auto !important; }
            .watermark-container, .watermark-text, #lblWatermark, .watermark1, .watermark2, .watermark3 { display: none !important; }
        }

        .section-break h2 { background: var(--primary); color: white; padding: 12px; border-radius: 6px; }
        table { width: 100% !important; border-collapse: collapse; margin-bottom: 30px; }
    </style>
</head>
<body>

<div class="container no-print">
    <div class="box">
        <h1>SSC Response Master Pro</h1>
        
        <div class="instructions">
            <strong>Instructions:</strong> Paste the link and set the number of sections. Use "Automate Fetch" to grab codes via backend. Ensure the section count matches exactly to avoid errors.
        </div>

        <div class="form-group">
            <label>Master Response Link (Part 1)</label>
            <input type="text" id="mainLink" placeholder="Paste URL here...">
        </div>

        <div class="settings-grid">
            <div class="form-group">
                <label>Total Sections</label>
                <input type="number" id="partCount" value="4" min="1" onchange="renderTextAreas()">
            </div>
            <div class="form-group">
                <label>Common Filename</label>
                <input type="text" id="commonName" value="SSC_Response">
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="hidePrivacy" checked>
                <label for="hidePrivacy">Hide Privacy Info</label>
            </div>
        </div>

        <button class="btn btn-fetch" onclick="autoFetch()">STEP 1: AUTOMATE FETCH DATA</button>
        
        <div id="loader">Fetching Sections... Please wait...</div>

        <div id="dynamicParts" class="part-list">
            </div>

        <button class="btn" style="background:var(--accent); margin-top:30px;" onclick="generateMergedPreview()">STEP 2: GENERATE MERGED PREVIEW</button>
        <button class="btn btn-zip" onclick="generateZip()">STEP 3: DOWNLOAD ALL AS ZIP (MERGED + SEPARATE)</button>
    </div>
</div>

<div id="print-area">
    <div class="no-print" style="text-align:center; padding: 20px; background: #eee;">
        <button class="btn" style="width:200px; background:var(--accent);" onclick="window.print()">PRINT / SAVE PDF</button>
        <button class="btn" style="width:200px; background:#666;" onclick="location.reload()">BACK</button>
    </div>
    <div id="merged-content"></div>
</div>

<script>
    const BACKEND_URL = "https://ssc-proxy-backend-production.up.railway.app";
    const BASE_IMG_URL = "https://sscexams.cbexams.com/chsl2025finalkeybdsghdnov12/";

    function renderTextAreas() {
        const count = document.getElementById('partCount').value;
        const container = document.getElementById('dynamicParts');
        container.innerHTML = '';
        for (let i = 1; i <= count; i++) {
            container.innerHTML += `
                <div class="part-section">
                    <strong>PART ${i} Code</strong>
                    <textarea id="srcPart${i}" placeholder="Code for Part ${i}..."></textarea>
                </div>`;
        }
    }
    renderTextAreas();

    async function autoFetch() {
        const link = document.getElementById('mainLink').value;
        const count = parseInt(document.getElementById('partCount').value);
        const loader = document.getElementById('loader');

        if (!link) return alert("Paste the Part 1 link first!");
        loader.style.display = 'block';

        try {
            for (let i = 1; i <= count; i++) {
                let targetUrl = i === 1 ? link : link.replace("ViewCandResponse.aspx", `ViewCandResponse${i}.aspx`);
                const response = await fetch(`${BACKEND_URL}?url=${encodeURIComponent(targetUrl)}`);
                if (!response.ok) throw new Error(`Failed to fetch Part ${i}`);
                const data = await response.json();
                if (data.source) document.getElementById(`srcPart${i}`).value = data.source;
            }
            alert("All sections fetched successfully!");
        } catch (err) {
            alert("Error: " + err.message + ". Check Backend or Section Count.");
        } finally {
            loader.style.display = 'none';
        }
    }

    function processHTML(rawHTML, partTitle) {
        let parser = new DOMParser();
        let doc = parser.parseFromString(rawHTML, 'text/html');
        const hideInfo = document.getElementById('hidePrivacy').checked;

        // Strip Watermarks
        doc.querySelectorAll('.watermark-container, .watermark-text, #lblWatermark, .watermark1, .watermark2, .watermark3, script, .aspNetHidden').forEach(el => el.remove());

        // Privacy
        if (hideInfo) {
            doc.querySelectorAll('tr').forEach(row => {
                if (row.innerText.includes("Roll No") || row.innerText.includes("Candidate Name")) row.remove();
            });
        }

        // Images
        doc.querySelectorAll('img').forEach(img => {
            let src = img.getAttribute('src');
            if (src && !src.startsWith('http')) img.src = BASE_IMG_URL + src;
        });

        let table = doc.querySelector('table');
        return table ? `<div class="section-break"><h2>${partTitle}</h2>${table.innerHTML}</div>` : '';
    }

    function generateMergedPreview() {
        const count = document.getElementById('partCount').value;
        let finalHTML = "";
        for (let i = 1; i <= count; i++) {
            let val = document.getElementById(`srcPart${i}`).value;
            if (val.trim()) finalHTML += processHTML(val, `PART ${i}`);
        }
        if (!finalHTML) return alert("Please fetch or paste code first.");
        document.querySelector('.container').style.display = 'none';
        document.getElementById('print-area').style.display = 'block';
        document.getElementById('merged-content').innerHTML = finalHTML;
    }

    async function generateZip() {
        const zip = new JSZip();
        const count = document.getElementById('partCount').value;
        const commonName = document.getElementById('commonName').value || "SSC";
        let mergedContent = "";

        const styleHeader = `<html><head><style>
            body { font-family: sans-serif; }
            .section-break { page-break-before: always; border-top: 1px solid #000; padding: 20px 0; }
            table { width: 100%; border-collapse: collapse; }
            h2 { background: #226785; color: white; padding: 10px; }
            img { max-width: 100%; height: auto; }
        </style></head><body>`;

        for (let i = 1; i <= count; i++) {
            let val = document.getElementById(`srcPart${i}`).value;
            if (val.trim()) {
                let cleaned = processHTML(val, `PART ${i}`);
                mergedContent += cleaned;
                // Add individual part file
                zip.file(`${commonName}-part${i}.html`, styleHeader + cleaned + "</body></html>");
            }
        }

        if (!mergedContent) return alert("No content found to ZIP.");
        zip.file(`${commonName}-full.html`, styleHeader + mergedContent + "</body></html>");

        const content = await zip.generateAsync({type: "blob"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(content);
        link.download = `${commonName}_Cleaned_Files.zip`;
        link.click();
    }
</script>
</body>
</html>
