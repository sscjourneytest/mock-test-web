<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Dashboard - Mock Matrix Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/auth.js"></script>
    <style>
        :root { --primary: #2563eb; --secondary: #1e293b; --success: #16a34a; --warning: #f59e0b; --accent: #6366f1; }
        body { background: #f1f5f9; font-family: 'Poppins', sans-serif; padding-top: 80px; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        .header-section { text-align: center; margin-bottom: 30px; }
        .card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.3); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 20px; text-align: center; transition: 0.3s; border-bottom: 5px solid var(--accent); }
        .stat-card:nth-child(2) { border-bottom-color: var(--success); }
        .stat-card:nth-child(3) { border-bottom-color: var(--primary); }
        .stat-card h2 { font-size: 32px; color: var(--secondary); margin: 10px 0; font-weight: 800; }
        .stat-card p { font-size: 14px; color: #64748b; font-weight: 600; }
        
        .coupon-badge { background: linear-gradient(135deg, var(--secondary), #0f172a); color: white; padding: 15px 35px; border-radius: 16px; font-size: 24px; font-weight: 800; letter-spacing: 3px; display: inline-block; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 2px dashed rgba(255,255,255,0.2); }
        
        .sync-container { text-align: right; margin-bottom: 15px; }
        .sync-btn { background: white; color: var(--primary); border: 2px solid var(--primary); padding: 8px 18px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 13px; transition: 0.2s; }
        .sync-btn:hover { background: var(--primary); color: white; }

        .withdraw-btn { background: var(--success); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 700; cursor: pointer; width: 100%; font-size: 16px; transition: 0.3s; box-shadow: 0 4px 15px rgba(22, 163, 74, 0.2); }
        .withdraw-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(22, 163, 74, 0.3); }
        .withdraw-btn:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .history-table { width: 100%; border-collapse: collapse; }
        .history-table th { padding: 15px; background: #f8fafc; color: #64748b; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .history-table td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; color: var(--secondary); }
        
        .status-badge { padding: 6px 12px; border-radius: 50px; font-size: 11px; font-weight: 700; }
        .pending { background: #fffbeb; color: #92400e; }
        .successful { background: #f0fdf4; color: #166534; }
        .rejected { background: #fef2f2; color: #991b1b; }
        
        @media (max-width: 768px) { .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <img src="/logo.png" style="width: 70px; margin-bottom: 15px;">
            <h1 style="color: var(--secondary); font-weight: 800;">Partner Command Center</h1>
            <div class="coupon-badge" id="myCode">...</div>
        </div>

        <div class="sync-container">
            <span id="lastSyncTime" style="font-size: 11px; color: #94a3b8; margin-right: 10px;"></span>
            <button class="sync-btn" id="syncBtn" onclick="manualRefresh()">
                <i class="fas fa-sync-alt"></i> Refresh Stats
            </button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <p><i class="fas fa-shopping-cart"></i> NEW SALES</p>
                <h2 id="newSales">0</h2>
            </div>
            <div class="stat-card">
                <p><i class="fas fa-wallet"></i> EARNINGS</p>
                <h2 id="availableBalance">₹0</h2>
            </div>
            <div class="stat-card">
                <p><i class="fas fa-check-double"></i> WITHDRAWN</p>
                <h2 id="totalWithdrawn">₹0</h2>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 10px;"><i class="fas fa-hand-holding-usd"></i> Request Payout</h3>
            <p style="color:#64748b; font-size: 13px; margin-bottom: 25px; line-height: 1.6;">
                Payouts are processed weekly (Minimum: ₹100). When you submit, we lock your sales up to this exact second.
            </p>
            <button class="withdraw-btn" id="withdrawBtn" onclick="requestPayout()">
                Submit Withdrawal Request
            </button>
            <p id="limitMsg" style="color: #ef4444; font-size: 12px; margin-top: 15px; font-weight: 600; display: none;"></p>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 20px;"><i class="fas fa-history"></i> Payout History</h3>
            <div style="overflow-x: auto;">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Requested Date</th>
                            <th>Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr><td colspan="3" style="text-align:center; color:#94a3b8;">Click Refresh Stats to load data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card" style="background: linear-gradient(135deg, #f8fafc, #f1f5f9);">
            <h3><i class="fas fa-share-alt"></i> Referral Link</h3>
            <div style="display: flex; gap: 10px; margin-top: 15px; background: white; padding: 12px; border-radius: 15px; border: 1px solid #e2e8f0;">
                <input type="text" id="referralLink" readonly style="flex: 1; border: none; background: transparent; font-weight: 700; color: var(--primary); outline: none; font-size: 14px;">
                <button onclick="copyRefLink()" class="sync-btn" style="border-radius: 10px;">
                    <i class="fas fa-copy"></i> Copy
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentCommission = 50; 
        let unpaidCount = 0;

        // Initialize from Cache
        document.addEventListener('DOMContentLoaded', () => {
            const profile = getLocalProfile();
            if (!profile || !profile.is_partner) {
                window.location.href = "apply-coupon.html";
                return;
            }
            document.getElementById('myCode').innerText = profile.partner_coupon;
            document.getElementById('referralLink').value = `${window.location.origin}/buy-premium.html?c=${profile.partner_coupon}`;

            const cachedData = localStorage.getItem('partner_stats_cache');
            if (cachedData) {
                const data = JSON.parse(cachedData);
                updateUI(data);
            }
        });

        async function manualRefresh() {
            const btn = document.getElementById('syncBtn');
            const profile = getLocalProfile();
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Syncing...';

            try {
                // 1. Fetch Latest Commission
                const { data: partnerData } = await _supabase.from('coupon_requests')
                    .select('commission_per_sale').eq('requested_code', profile.partner_coupon).single();
                if (partnerData) currentCommission = partnerData.commission_per_sale;

                // 2. Load Sales Data
                await loadDashboardData(profile);
                
                document.getElementById('lastSyncTime').innerText = `Last synced: ${new Date().toLocaleTimeString()}`;
            } catch (err) {
                alert("Sync failed. Check connection.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sync-alt"></i> Refresh Stats';
            }
        }

        async function loadDashboardData(profile) {
            const { data: lastReq } = await _supabase.from('payout_requests')
                .select('requested_at').eq('user_id', profile.id)
                .neq('status', 'rejected').order('requested_at', { ascending: false }).limit(1);

            let lastDate = lastReq && lastReq[0] ? lastReq[0].requested_at : '2000-01-01';

            const { count } = await _supabase.from('payment_requests')
                .select('*', { count: 'exact', head: true })
                .eq('coupon_used', profile.partner_coupon).eq('status', 'success').gt('created_at', lastDate);

            const { data: history } = await _supabase.from('payout_requests')
                .select('*').eq('user_id', profile.id).order('requested_at', { ascending: false });

            const stats = { unpaidCount: count || 0, commission: currentCommission, history: history || [] };
            localStorage.setItem('partner_stats_cache', JSON.stringify(stats));
            updateUI(stats);
        }

        function updateUI(stats) {
            unpaidCount = stats.unpaidCount;
            currentCommission = stats.commission;
            document.getElementById('newSales').innerText = unpaidCount;
            document.getElementById('availableBalance').innerText = "₹" + (unpaidCount * currentCommission);

            let totalW = 0;
            let historyHtml = '';
            stats.history.forEach(row => {
                if(row.status === 'successful') totalW += row.amount;
                historyHtml += `<tr>
                    <td>${new Date(row.requested_at).toLocaleDateString()}</td>
                    <td>₹${row.amount}</td>
                    <td><span class="status-badge ${row.status}">${row.status.toUpperCase()}</span></td>
                </tr>`;
            });
            document.getElementById('historyBody').innerHTML = historyHtml || '<tr><td colspan="3">No history found</td></tr>';
            document.getElementById('totalWithdrawn').innerText = "₹" + totalW;

            checkWithdrawalLimit(stats.history);
        }

        function checkWithdrawalLimit(history) {
            const lastValidReq = history.find(h => h.status !== 'rejected');
            if (lastValidReq) {
                const diff = (new Date() - new Date(lastValidReq.requested_at)) / (1000 * 60 * 60 * 24);
                if (diff < 7) {
                    const btn = document.getElementById('withdrawBtn');
                    btn.disabled = true;
                    btn.innerText = "Weekly Limit Active";
                    document.getElementById('limitMsg').style.display = 'block';
                    document.getElementById('limitMsg').innerText = `Next withdrawal available in ${Math.ceil(7 - diff)} days.`;
                }
            }
        }

        async function requestPayout() {
            const profile = getLocalProfile();
            const now = new Date().toISOString();
            const amount = unpaidCount * currentCommission;

            if (amount < 100) return alert("Minimum ₹100 required.");

            const { error } = await _supabase.from('payout_requests').insert([{
                user_id: profile.id, username: profile.username, email: profile.email,
                coupon_code: profile.partner_coupon, amount: amount, status: 'pending', payout_upto: now 
            }]);

            if (!error) {
                const botToken = "8609211512:AAH9oHSAXAWuqkqqrPNtdZyuVHXCsT1f8ys";
                const chatId = "-1003502354207";
                const text = `💰 *NEW PAYOUT REQUEST*\nPartner: ${profile.username}\nAmount: ₹${amount}\nCoupon: ${profile.partner_coupon}`;
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
                alert("Request submitted!");
                localStorage.removeItem('partner_stats_cache');
                location.reload();
            } else {
                alert("Error: " + error.message);
            }
        }

        function copyRefLink() {
            const linkInput = document.getElementById('referralLink');
            linkInput.select();
            document.execCommand('copy');
            alert("Referral link copied!");
        }
    </script>
</body>
</html>
