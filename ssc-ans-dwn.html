<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SSC Response Master Pro (Universal Image Loader)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --p: #226785; --s: #28a745; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; }
        .box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; color: var(--p); font-size: 24px; }
        .input-group { margin-bottom: 20px; background: #fff9e6; padding: 15px; border-radius: 8px; border: 1px solid #ffeeba; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; }
        .part-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; }
        .part-card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; background: #fafafa; border-top: 5px solid var(--p); }
        .part-card a { display: block; margin: 10px 0; color: var(--p); font-weight: bold; text-decoration: none; font-size: 14px; }
        .part-card a:hover { text-decoration: underline; }
        .status-text { font-size: 12px; color: #666; font-style: italic; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        button { border: none; padding: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; color: white; transition: 0.2s; }
        .btn-gen { background: var(--s); }
        .btn-zip { background: #f59e0b; }
        
        /* Cleanup Styles */
        .watermark-container, .watermark-text, #lblWatermark, .watermark1, .watermark2, .watermark3, script, .aspNetHidden, .challenge-btn, input[type="submit"] { 
            display: none !important; opacity: 0 !important; visibility: hidden !important; height: 0 !important;
        }
        .privacy-hidden { opacity: 0 !important; visibility: hidden !important; }

        #print-area { display: none; background: white; padding: 20px; }
        @media print {
            .no-print { display: none !important; }
            #print-area { display: block !important; }
            .section-break { page-break-before: always; border-top: 2px solid #226785; padding-top: 20px; margin-top: 20px; }
            img { max-width: 100%; height: auto; display: block; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
        .section-break h2 { background: var(--p); color: white; padding: 10px; border-radius: 4px; }
        
        table { 
            width: 100% !important; 
            border-collapse: collapse !important; 
            margin-bottom: 20px !important; 
            table-layout: auto !important;
        }

        td { 
            padding: 2px 5px !important; 
            font-size: 13px !important;   
            line-height: 1.1 !important; 
        }

        img { 
            max-width: 90% !important; 
            height: auto !important; 
            display: inline-block !important; 
            margin: 2px 0 !important;
        }
    </style>
</head>
<body>

<div class="box no-print">
    <h1>SSC Response Master Pro</h1>
    
    <div class="input-group">
        <label><strong>1. Paste Link & Common Name:</strong></label>
        <input type="text" id="mainLink" placeholder="Paste Section 1 URL here..." oninput="generateLinks()">
        <input type="text" id="commonName" placeholder="Enter Common Name (e.g. MyExam_2025)">
        <input type="text" id="totalParts" placeholder="Total Sections (e.g. 4)" value="4">
    </div>

    <div class="part-grid" id="partDisplay">
        </div>

    <div class="btn-row">
        <button class="btn-gen" style="background: #007BFF;" onclick="autoFetchAll()">STEP 2: AUTO-FETCH & PREVIEW</button>
        <button class="btn-zip" onclick="downloadZip()">STEP 3: DOWNLOAD HTML ZIP</button>
    </div>
</div>

<div id="print-area">
    <div class="no-print" style="text-align:center; position: sticky; top: 0; background: #eee; padding: 15px; z-index: 100;">
        <button id="savePdfBtn" onclick="window.print()" style="background: var(--s); width: 250px;">SAVE MERGED PDF</button>
        <button onclick="location.reload()" style="background: #666; width: 150px; margin-left: 10px;">BACK</button>
    </div>
    <div id="merged-content"></div>
</div>

<script>
    const apiKey = "79640730-ec5e-4ded-97c4-5071004a04dc";
    let currentBaseUrl = "";
    let fetchedSources = {};

    function generateLinks() {
        const link = document.getElementById('mainLink').value.trim();
        const parts = parseInt(document.getElementById('totalParts').value) || 4;
        if(!link) return;
        
        currentBaseUrl = link.substring(0, link.lastIndexOf("/") + 1);
        let html = "";

        for(let i=1; i<=parts; i++) {
            let url = i === 1 ? link : link.replace("ViewCandResponse.aspx", `ViewCandResponse${i}.aspx`);
            html += `<div class="part-card"><strong>SECTION ${i}</strong><a href="${url}" target="_blank">Open Link ↗</a><div id="status${i}" class="status-text">Ready to fetch</div></div>`;
        }
        document.getElementById('partDisplay').innerHTML = html;
    }

    async function autoFetchAll() {
        const link = document.getElementById('mainLink').value.trim();
        const parts = parseInt(document.getElementById('totalParts').value) || 4;
        if(!link) return alert("Please paste the link first!");

        for(let i=1; i<=parts; i++) {
            let url = i === 1 ? link : link.replace("ViewCandResponse.aspx", `ViewCandResponse${i}.aspx`);
            document.getElementById(`status${i}`).innerText = "Fetching...";
            
            try {
                const response = await fetch(`https://api.webscraping.ai/html?api_key=${apiKey}&url=${encodeURIComponent(url)}&render=true`);
                const data = await response.text();
                fetchedSources[i] = data;
                document.getElementById(`status${i}`).innerText = "Successfully Fetched ✅";
            } catch (err) {
                document.getElementById(`status${i}`).innerText = "Error Fetching ❌";
            }
        }
        showPreview();
    }

    function processContent(raw, title) {
        let parser = new DOMParser();
        let doc = parser.parseFromString(raw, 'text/html');

        // Remove redundant breaks but keep one for spacing
        doc.querySelectorAll('br + br').forEach(br => br.remove());

        // Privacy Hiding
        doc.querySelectorAll('td.bld').forEach(td => {
            let txt = td.innerText;
            if(txt.includes('Roll No') || txt.includes('Candidate Name')) {
                td.classList.add('privacy-hidden');
                if(td.nextElementSibling) td.nextElementSibling.classList.add('privacy-hidden');
            }
        });

        // Cleanup System
        doc.querySelectorAll('.watermark-container, .watermark-text, #lblWatermark, .watermark1, .watermark2, .watermark3, script, .aspNetHidden, .challenge-btn, input[type="submit"]').forEach(el => el.remove());

        // Dynamic Image Loader
        doc.querySelectorAll('img').forEach(img => {
            let src = img.getAttribute('src');
            if (src && !src.startsWith('http')) {
                img.src = currentBaseUrl + src;
            }
        });

        let bodyContent = doc.body.innerHTML;
        return bodyContent ? `<div class="section-break"><h2>${title}</h2>${bodyContent}</div>` : "";
    }

    function showPreview() {
        let finalHTML = "";
        const parts = parseInt(document.getElementById('totalParts').value) || 4;
        const name = document.getElementById('commonName').value || "merged";
        
        for(let i=1; i<=parts; i++) {
            if(fetchedSources[i]) finalHTML += processContent(fetchedSources[i], `PART ${i}`);
        }
        
        if(!finalHTML) return alert("No content fetched!");
        document.title = name + "_full";
        document.querySelector('.box').style.display = 'none';
        document.getElementById('print-area').style.display = 'block';
        document.getElementById('merged-content').innerHTML = finalHTML;
    }

    async function downloadZip() {
        const zip = new JSZip();
        let fullContent = "";
        const name = document.getElementById('commonName').value || "SSC_Exam";
        const parts = parseInt(document.getElementById('totalParts').value) || 4;
        const head = `<html><head><style>body{padding:20px;font-family:sans-serif;} .section-break{page-break-before:always;} h2{background:#226785;color:white;padding:10px;} table{width:100%;border-collapse:collapse;margin-bottom:20px;} img{max-width:100%;} .privacy-hidden{opacity:0!important;} *{-webkit-print-color-adjust:exact!important;}</style></head><body>`;

        for(let i=1; i<=parts; i++) {
            if(fetchedSources[i]) {
                let cleaned = processContent(fetchedSources[i], `PART ${i}`);
                fullContent += cleaned;
                zip.file(`Section_${i}.html`, head + cleaned + "</body></html>");
            }
        }

        if(!fullContent) return alert("Fetch data first!");
        zip.file(`${name}_merged.html`, head + fullContent + "</body></html>");

        const blob = await zip.generateAsync({type: "blob"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = name + "_Package.zip";
        a.click();
    }
</script>
</body>
</html>
