<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Test Center | SSC Journey</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg-light: #f1f5f9;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --text-dark: #0f172a;
            --text-grey: #64748b;
            --live-red: #ef4444;
        }

        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--bg-light); color: var(--text-dark); }
        .page-container { display: flex; flex-direction: column; height: 100vh; }
/* New Header Layout */
.header-content {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 15px;
    background: var(--white);
}

.back-btn {
    color: var(--text-dark);
    display: flex;
    align-items: center;
    text-decoration: none;
    transition: opacity 0.2s;
}

.back-btn:hover { opacity: 0.7; }

.header-title {
    margin: 0;
    font-size: 18px;
    font-weight: 800;
    color: var(--text-dark);
    letter-spacing: -0.5px;
}

/* Tabs now sit below the main title */
.filter-scroll-wrapper {
    display: flex;
    justify-content: flex-start; /* Aligns tabs to the left/start */
    padding: 0 10px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: var(--white);
}

.pill-filter {
    padding: 12px 20px;
    font-size: 13px;
    border-bottom: 3px solid transparent;
}
        

        /* Centered Grid */
        .content-area { flex-grow: 1; overflow-y: auto; padding: 25px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, 300px); 
            justify-content: center; 
            gap: 25px; 
        }

        /* Square Card UI */
        .card {
            background: var(--white);
            background-color: white;
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 300px;
            height: 340px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 25px;
            box-sizing: border-box;
            position: relative;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .status-badge {
            position: absolute; top: 20px; font-size: 10px; font-weight: 900; 
            padding: 4px 12px; border-radius: 20px; text-transform: uppercase;
        }
        .badge-live { background: #fee2e2; color: var(--live-red); border: 1px solid var(--live-red); }
        .badge-upcoming { background: #fef3c7; color: #d97706; }
        .badge-ended { background: #f1f5f9; color: var(--text-grey); }

        .title { font-size: 17px; font-weight: 800; margin-top: 20px; margin-bottom: 8px; }
        .meta { font-size: 12px; color: var(--text-grey); font-weight: 600; margin-bottom: 20px; }

        /* Buttons */
        .btn-box { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .btn {
            padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 800;
            text-decoration: none; text-align: center; border: none; cursor: pointer;
        }
        .btn-start { background: var(--primary); color: white; }
        .btn-view { background: #4f46e5; color: white; }
        .btn-wait { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }

        /* Bottom Score Bar */
        .score-box { width: 100%; margin-top: auto; padding-top: 15px; border-top: 1px solid #f1f5f9; }
        .bar-bg { width: 100%; height: 6px; background: #f1f5f9; border-radius: 3px; overflow: hidden; margin-top: 5px; }
        .bar-fill { height: 100%; }
        .score-txt { font-size: 11px; font-weight: 800; text-align: left; display: block; }
    </style>
</head>
<body>

<div class="page-container">
    <header class="sticky-header-section">
    <div class="header-content">
        <a href="../" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <h1 class="header-title">LIVE TESTS</h1>
    </div>

    <div class="filter-scroll-wrapper">
        <button class="pill-filter active" id="tab-live" onclick="setTab('live')">🔴 LIVE NOW</button>
        <button class="pill-filter" id="tab-prev" onclick="setTab('previous')">📂 PREVIOUS LIVE</button>
    </div>
    </header>
    


    <main class="content-area">
        <div id="quizGrid" class="grid">
            <div style="grid-column: 1/-1; text-align: center; padding: 40px;">Syncing Live Database...</div>
        </div>
    </main>
</div>

<script>
    let TESTS = [];
    let activeTab = 'live';

    async function init() {
        try {
            // Fetch the backend JSON
            const res = await fetch('https://sscjourneytest.github.io/sscjourneytest/data/live-data.json');
            const json = await res.json();
            TESTS = json.tests || [];
            render();
            // Refresh statuses every minute
            setInterval(render, 60000);
        } catch (e) {
            document.getElementById('quizGrid').innerHTML = "Failed to load live data.";
        }
    }

    function render() {
        const grid = document.getElementById('quizGrid');
        const now = new Date().getTime();
        const profile = (typeof getLocalProfile === 'function') ? getLocalProfile() : {username: "Guest"};
        
        let html = '';

        TESTS.forEach(item => {
            const start = new Date(item.startTime).getTime();
            const end = new Date(item.endTime).getTime();
            
            const isUpcoming = now < start;
            const isLive = now >= start && now <= end;
            const isEnded = now > end;

            // Filter logic for tabs
            if (activeTab === 'live' && isEnded) return;
            if (activeTab === 'previous' && !isEnded) return;

            // LocalStorage Check
            const resKey = `result_${profile.username}_${item.id}`;
            const savedRes = JSON.parse(localStorage.getItem(resKey) || "{}");

            // 1. Status & Timer UI
            let badge = '';
            let action = '';
            // Determine template path (relative to parallel folder)
            const templatePath = `../exams/${item.template || 'full-test.html'}`;

            if (isUpcoming) {
                badge = `<div class="status-badge badge-upcoming">UPCOMING</div>`;
                action = `<div class="btn btn-wait">STARTS: ${new Date(item.startTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>`;
            } else if (isLive) {
                badge = `<div class="status-badge badge-live">● LIVE</div>`;
                if (savedRes.submitted) {
                    action = `<a href="${templatePath}?id=${item.id}" class="btn btn-view">VIEW ANALYSIS</a>`;
                } else {
                    action = `<a href="${templatePath}?id=${item.id}" class="btn btn-start">START TEST</a>`;
                }
            } else {
                badge = `<div class="status-badge badge-ended">ENDED</div>`;
                action = `<a href="${templatePath}?id=${item.id}" class="btn btn-view">VIEW ANALYSIS</a>`;
            }

            // 2. Score Bar UI
            let score = '';
            if (savedRes.submitted) {
                const pct = Math.min(100, (savedRes.totalMarks / (item.marks || 100)) * 100);
                const color = pct >= 75 ? '#22c55e' : (pct >= 50 ? '#f59e0b' : '#ef4444');
                score = `
                    <div class="score-box">
                        <span class="score-txt">SCORE: ${savedRes.totalMarks}/${item.marks}</span>
                        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%; background:${color}"></div></div>
                    </div>
                `;
            }

            html += `
                <div class="card">
                    ${badge}
                    <div class="title">${item.title}</div>
                    <div class="meta">${item.qs} Questions • ${item.time}</div>
                    <div class="btn-box">${action}</div>
                    ${score}
                </div>
            `;
        });

        grid.innerHTML = html || `<div style="grid-column: 1/-1; text-align:center; padding:50px; color:gray;">No tests available in this section.</div>`;
    }

    function setTab(t) {
        activeTab = t;
        document.getElementById('tab-live').classList.toggle('active', t === 'live');
        document.getElementById('tab-prev').classList.toggle('active', t === 'previous');
        render();
    }

    // Mock getLocalProfile if not available
    if (typeof getLocalProfile !== 'function') {
        window.getLocalProfile = () => JSON.parse(localStorage.getItem('user_profile') || '{"username":"Guest"}');
    }

    init();
</script>
</body>
</html>
