<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications - Mock Matrix Hub</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        --primary: #2563eb;
        --primary-light: #eff6ff;
        --text-dark: #0f172a;
        --bg-light: #f8fafc;
        --white: #ffffff;
        --border: #e2e8f0;
    }
    body.dark-mode {
        --text-dark: #f1f5f9;
        --bg-light: #0f172a;
        --white: #1e293b;
        --border: #334155;
    }
    body {
        background: var(--bg-light);
        color: var(--text-dark);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding-bottom: 90px; /* room for bottom nav */
    }
    .page-header {
        background: var(--white);
        border-bottom: 1px solid var(--border);
        padding: 16px 18px;
        display: flex;
        align-items: center;
        gap: 14px;
        position: sticky;
        top: 0;
        z-index: 10;
    }
    .page-header a { color: var(--text-dark); font-size: 1.1rem; }
    .page-header h1 { font-size: 1.05rem; font-weight: 800; margin: 0; }

    .notif-list { padding: 12px; max-width: 640px; margin: 0 auto; }

    .notif-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px 16px;
        margin-bottom: 10px;
        display: flex;
        gap: 12px;
        text-decoration: none;
        color: var(--text-dark);
        transition: transform 0.1s;
    }
    .notif-card:active { transform: scale(0.985); }

    .notif-card.unread {
        border-color: var(--primary);
        background: var(--primary-light);
    }

    .notif-icon {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: var(--primary-light);
        color: var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 1rem;
    }
    .notif-card.unread .notif-icon {
        background: var(--primary);
        color: white;
    }

    .notif-body { flex: 1; min-width: 0; }
    .notif-title {
        font-weight: 700;
        font-size: 0.95rem;
        margin-bottom: 2px;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .unread-dot {
        width: 8px;
        height: 8px;
        background: #ef4444;
        border-radius: 50%;
        flex-shrink: 0;
    }
    .notif-text {
        font-size: 0.87rem;
        color: var(--text-dark);
        opacity: 0.8;
        line-height: 1.4;
    }
    .notif-time {
        font-size: 0.75rem;
        opacity: 0.55;
        margin-top: 5px;
    }

    .load-more-btn {
        display: block;
        width: 100%;
        background: var(--white);
        border: 1px solid var(--border);
        color: var(--primary);
        font-weight: 700;
        padding: 12px;
        border-radius: 12px;
        margin-top: 6px;
        cursor: pointer;
    }
    .load-more-btn:disabled { opacity: 0.5; }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        opacity: 0.6;
    }
    .empty-state i { font-size: 2.5rem; margin-bottom: 12px; }

    .skeleton {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 14px;
        height: 70px;
        margin-bottom: 10px;
        animation: pulse 1.2s infinite ease-in-out;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
</style>
</head>
<body>

<header class="page-header">
    <a href="javascript:history.back()"><i class="fas fa-arrow-left"></i></a>
    <h1>Notifications</h1>
</header>

<div class="notif-list" id="notifList">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
</div>

<button class="load-more-btn" id="loadMoreBtn" style="display:none;" onclick="loadNotifications(false)">
    Load More
</button>

<script>
const NOTIFY_API_BASE = 'https://mmh-notify-worker.mockmatrixsupport.workers.dev';
const PAGE_SIZE = 10;

let oldestLoadedId = null;
let lastSeenIdAtPageLoad = parseInt(localStorage.getItem('mmh_last_seen_notif_id') || '0', 10);
let newestIdSeenThisSession = lastSeenIdAtPageLoad;

function timeAgo(unixSeconds) {
    const diffMs = Date.now() - (unixSeconds * 1000);
    const mins = Math.floor(diffMs / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hours = Math.floor(mins / 60);
    if (hours < 24) return hours + 'h ago';
    const days = Math.floor(hours / 24);
    if (days < 7) return days + 'd ago';
    return new Date(unixSeconds * 1000).toLocaleDateString();
}

function renderNotification(n) {
    const isUnread = n.id > lastSeenIdAtPageLoad;
    if (n.id > newestIdSeenThisSession) newestIdSeenThisSession = n.id;

    const card = document.createElement('a');
    card.href = n.url || '#';
    card.className = 'notif-card' + (isUnread ? ' unread' : '');
    card.innerHTML = `
        <div class="notif-icon"><i class="fas fa-bell"></i></div>
        <div class="notif-body">
            <div class="notif-title">${isUnread ? '<span class="unread-dot"></span>' : ''}${escapeHtml(n.title)}</div>
            <div class="notif-text">${escapeHtml(n.body)}</div>
            <div class="notif-time">${timeAgo(n.created_at)}</div>
        </div>
    `;
    return card;
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
}

async function loadNotifications(isFirstLoad) {
    const listEl = document.getElementById('notifList');
    const btn = document.getElementById('loadMoreBtn');

    if (isFirstLoad) {
        listEl.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
    } else {
        btn.disabled = true;
        btn.textContent = 'Loading...';
    }

    try {
        let url = `${NOTIFY_API_BASE}/api/notify/list?limit=${PAGE_SIZE}`;
        if (!isFirstLoad && oldestLoadedId) {
            url += `&before_id=${oldestLoadedId}`;
        }

        const res = await fetch(url);
        const data = await res.json();
        const list = data.notifications || [];

        if (isFirstLoad) listEl.innerHTML = '';

        if (list.length === 0 && isFirstLoad) {
            listEl.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-bell-slash"></i>
                    <div>No notifications yet</div>
                </div>`;
            btn.style.display = 'none';
            return;
        }

        list.forEach(n => {
            listEl.appendChild(renderNotification(n));
            oldestLoadedId = n.id; // track the oldest id we've loaded so far, for pagination
        });

        btn.style.display = data.hasMore ? 'block' : 'none';
        btn.disabled = false;
        btn.textContent = 'Load More';

        // Mark everything currently visible as "seen" — clears the bell badge.
        if (newestIdSeenThisSession > 0) {
            localStorage.setItem('mmh_last_seen_notif_id', String(newestIdSeenThisSession));
        }
    } catch (err) {
        console.error('Failed to load notifications:', err);
        if (isFirstLoad) {
            listEl.innerHTML = `<div class="empty-state"><i class="fas fa-triangle-exclamation"></i><div>Couldn't load notifications. Pull to refresh.</div></div>`;
        } else {
            btn.disabled = false;
            btn.textContent = 'Load More';
        }
    }
}

// Apply dark mode if the rest of the site uses it (matches existing toggle key)
if (localStorage.getItem('mmh_theme') === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.body.classList.add('dark-mode');
}

loadNotifications(true);
</script>

</body>
</html>
