<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Series Portal | MMH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../exams/exam-style.css">
</head>
<body>

    <div class="exam-page-container">
    <div class="sticky-header-section">
        <div class="p-3 d-flex align-items-center border-bottom">
            <a href="/series/" class="text-dark me-3"><i class="fas fa-arrow-left fs-5"></i></a>
            <h5 class="m-0 fw-bold" id="seriesTitleDisplay">Preparation Series</h5>
        </div>
        
        
        <div class="search-input-wrap mt-2">
            <input type="text" id="mockSearch" placeholder="Search chapter or topic..." onkeyup="renderMocks()">
        </div>

        <div class="filter-scroll-wrapper" id="year-scroll"></div>

        <div class="filter-scroll-wrapper" id="subject-wrap">
            <div id="subject-scroll" class="d-flex gap-2"></div>
        </div>

        <div class="filter-scroll-wrapper hidden" id="topic-wrap">
            <div id="topic-scroll" class="d-flex gap-2"></div>
        </div>
    </div>

    <div class="scrollable-grid-area">
        <div id="grid-sync" class="text-center small text-primary mb-3"></div>
        <div id="quizGrid"></div>
    </div>
    </div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/auth.js"></script> 
<script src="../exams/ssc-sub-engine2.js"></script>

<script>
    // Logic to update the header title based on the URL query (e.g., ?AtoZ-V)
    function updateSeriesUI() {
        const query = window.location.search;
        if (query) {
            // Remove '?' and replace dashes with spaces for a clean title
            const sName = query.slice(1).replace(/-/g, ' ');
            document.getElementById('seriesTitleDisplay').innerText = sName.toUpperCase();
        }
    }

    updateSeriesUI();
   
    document.addEventListener('DOMContentLoaded', () => {
        // 1. Check if home page set the theme to 'dark'
        if (localStorage.getItem('mmh_theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        // 2. Initialize the exam engine as normal
        initExamEngine();
    });

</script>
</body>
</html>
