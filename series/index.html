<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Series Hub | Mock Matrix Hub</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --text-dark: #0f172a;
            --text-grey: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
        }

        body.dark-mode {
            --bg-light: #0f172a;
            --white: #1e293b;
            --text-dark: #f1f5f9;
            --text-grey: #94a3b8;
            --border: #334155;
            background-color: #020617 !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding-bottom: 80px;
        }

        /* --- APP TOP BAR --- */
        .app-header {
            background: var(--white);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-sm);
            border-bottom: 1px solid var(--border);
        }

        .back-btn {
            background: none; border: none; font-size: 1.2rem;
            color: var(--text-dark); cursor: pointer;
            padding: 0; display: flex; align-items: center;
        }

        .header-title {
            font-weight: 800; font-size: 1.15rem; margin: 0;
            flex-grow: 1;
        }

        /* --- VIEW CONTAINERS --- */
        .view-screen { display: none; padding: 20px; animation: slideIn 0.3s ease-out; }
        .view-screen.active { display: block; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(15px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* --- GRID & BOXES --- */
        .category-grid {
            display: grid; grid-template-columns: 1fr; gap: 15px;
        }

        .exam-box {
            background: var(--white);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: inherit;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s;
        }

        .exam-box:active { transform: scale(0.97); }

        .exam-logo-img {
            width: 50px; height: 50px;
            border-radius: 12px;
            object-fit: cover;
            margin-right: 15px;
            background: #fff;
        }

        .exam-info h3 { font-size: 1rem; font-weight: 800; margin: 0; }
        .exam-info p { font-size: 0.75rem; color: var(--text-grey); margin: 3px 0 0; line-height: 1.3; }

        .chevron { margin-left: auto; color: var(--text-grey); font-size: 0.9rem; }

        .badge-soon {
            font-size: 0.65rem; background: #fee2e2; color: #ef4444;
            padding: 2px 8px; border-radius: 50px; font-weight: 700;
            margin-left: 10px;
        }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--white); display: flex; justify-content: space-around;
            padding: 12px 0; border-top: 1px solid var(--border); z-index: 1000;
        }
        .nav-item {
            text-align: center; color: var(--text-grey); text-decoration: none;
            font-size: 0.7rem; font-weight: 600; flex: 1;
        }
        .nav-item i { display: block; font-size: 1.3rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <header class="app-header">
        <button class="back-btn" onclick="handleBack()"><i class="fas fa-arrow-left"></i></button>
        <h1 class="header-title" id="pageTitle">Preparation Series</h1>
    </header>

    <div id="view-categories" class="view-screen active">
        <div class="category-grid">
            <a href="/series/portal.html?AtoZ-V" class="exam-box">
                <div class="exam-logo-img d-flex align-items-center justify-content-center bg-light">
                    <i class="fas fa-spell-check fs-3 text-primary"></i>
                </div>
                <div class="exam-info">
                    <h3>A TO Z VOCABULARY Series</h3>
                    <p>2020-2025 SSC EXAMS + OTHER EXAMS VOCABULARY</p>
                </div>
                <i class="fas fa-chevron-right chevron"></i>
            </a>

            <a href="#" class="exam-box" onclick="alert('More series coming soon!')">
                <div class="exam-logo-img d-flex align-items-center justify-content-center bg-light">
                    <i class="fas fa-layer-group fs-3 text-secondary"></i>
                </div>
                <div class="exam-info">
                    <h3>Upcoming Series <span class="badge-soon">COMING SOON</span></h3>
                    <p>Mathematics and Reasoning special series...</p>
                </div>
                <i class="fas fa-chevron-right chevron"></i>
            </a>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="/" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="/exams/" class="nav-item"><i class="fas fa-book-open"></i><span>Exams</span></a>
        <a href="/live-test" class="nav-item"><i class="fas fa-bolt"></i><span>Live</span></a>
        <a href="/profile" class="nav-item"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    </nav>

    <script>
        function handleBack() {
            window.location.href = '/';
        }

        // Theme Sync
        if (localStorage.getItem('theme') === 'dark' || localStorage.getItem('mmh_theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
