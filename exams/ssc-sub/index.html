<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SSC Subject Wise PYQs | Mock Matrix Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../exam-style.css">
</head>
<body>

<div class="exam-page-container">
    <div class="sticky-header-section">
        <div class="p-3 d-flex align-items-center border-bottom">
            <a href="../" class="text-dark me-3"><i class="fas fa-arrow-left fs-5"></i></a>
            <h5 class="m-0 fw-bold">SSC Subject Wise Mocks</h5>
        </div>

        <div class="search-input-wrap mt-2">
            <input type="text" id="mockSearch" placeholder="Search chapter or topic..." onkeyup="renderMocks()">
        </div>

        <div class="filter-scroll-wrapper" id="year-scroll"></div>

        <div class="filter-scroll-wrapper" id="subject-wrap">
            <div id="subject-scroll" class="d-flex gap-2"></div>
        </div>

        <div class="filter-scroll-wrapper hidden" id="topic-wrap">
            <div id="topic-scroll" class="d-flex gap-2"></div>
        </div>
    </div>

    <div class="scrollable-grid-area">
        <div id="grid-sync" class="text-center small text-primary mb-3"></div>
        <div id="quizGrid"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/auth.js"></script> 
<script src="./ssc-sub-engine.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', initExamEngine);
</script>
</body>
</html>
